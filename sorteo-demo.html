<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Exclusivo | Demo Todas las Cremas</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f5; --accent: #ff3366; --text: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; }
        
        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .hero-title { 
            font-family: 'Syne', sans-serif; 
            font-size: clamp(2.5rem, 10vw, 6rem); 
            text-transform: uppercase; 
            text-align: center; 
            line-height: 0.9;
            margin-bottom: 20px;
        }

        .highlight { color: var(--accent); }

        .form-card {
            background: white;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            border: 3px solid var(--text);
            box-shadow: 10px 10px 0px var(--text);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: white;
            border: 2px solid var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover { transform: translate(-3px, -3px); box-shadow: 5px 5px 0px var(--text); }

        .footer-text { margin-top: 20px; font-size: 0.7rem; opacity: 0.6; text-align: center; }

        @media (max-width: 768px) {
            .hero-title { font-size: 15vw; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <section>
        <h1 class="hero-title">Gana un <br><span class="highlight">Full Access</span></h1>
        
        <div class="form-card">
            <p style="margin-bottom: 20px; font-weight: 700;">Regístrate para participar en el sorteo del próximo evento.</p>
            <form id="sorteoForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" placeholder="Ej. Sandra Cassinelli" required>
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="tel" placeholder="+51 ..." required>
                </div>
                <button type="submit" class="btn-submit">¡Quiero Ganar!</button>
            </form>
        </div>

        <p class="footer-text">Powered by Todas las Cremas | Innovación para Productores</p>
    </section>

</body>
</html>
